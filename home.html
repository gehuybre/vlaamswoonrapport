<!-- homepage.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vlaamse Woonbalans - Gemeente Selectie</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.css">
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.js"></script>
</head>
<body>
    <div class="logo-container">
        <div class="donut"></div>
        <div class="logo-text">
            Vlaamse Woonbalans
            <span class="sub-text">Zoom in en selecteer uw gemeente</span>
        </div>
    </div>

    <!-- Search bar for filtering municipalities -->
    <div class="search-container">
        <input type="text" id="search-bar" placeholder="Zoek uw gemeente..." oninput="filterGemeente()" />
    </div>

    <!-- Map container -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- Scroll indicator -->
    <div id="scroll-indicator">
        <p>Scroll naar beneden</p>
        <div class="arrow-down"></div>
    </div>

    <!-- Optional additional content can go here -->
    <div class="content-wrapper">
        <!-- Additional content or sections can be added here -->
    </div>

    <!-- Scripts for map and additional functionalities -->
    <script src="static/js/map_home.js"></script>
    <script src="static/js/scroll-effects.js"></script>
    <script src="static/js/animations.js"></script>
    <script>
        // Initialize the map on page load
        document.addEventListener('DOMContentLoaded', function() {
            const options = {
                center: [50.85, 4.35],
                zoom: 8
            };
            initializeMap(["#FF0000", "#00FF00"], "", options); // Initialize without a specific gemeente
            initAnimations();
        });
    </script>
</body>
</html>
